episode_days: 1
steps_per_day: 1
seed: 42

initial_state:
  activity_level: sedentary

state:
  factors:
    activity_level:
      dims: 2
      names: [sedentary, active]

actions:
  - nudge
  - idle

reward:
  factor: activity_level
  values:
    sedentary: 0.0
    active: 1.0

transition_model:
  type: rule_based
  table_dir: tests/assets/tables

agents:
  - type: random
