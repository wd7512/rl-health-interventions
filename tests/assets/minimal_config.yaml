episode_days: 1
steps_per_day: 1
seed: 42
initial_state: sedentary

states:
  sedentary:
    reward: 0.0
  active:
    reward: 1.0

actions:
  - nudge
  - idle

transition_model:
  type: rule_based
  transition_probabilities:
    sedentary:
      nudge:
        active: 0.5
        sedentary: 0.5
      idle:
        active: 0.5
        sedentary: 0.5
    active:
      nudge:
        active: 0.5
        sedentary: 0.5
      idle:
        active: 0.5
        sedentary: 0.5

agents:
  - type: random
