episode_days: 1
steps_per_day: 1
seed: 42

state:
  variables:
    activity_level:
      dims: 2
      names: [sedentary, active]

initial_state:
  activity_level: sedentary

actions:
  - nudge
  - idle

reward:
  variables:
    value:
      source: state.activity_level
      mapping: {sedentary: 0.0, active: 1.0}
  formula: "value"

transition_model:
  type: rule_based
  transition_probabilities:
    sedentary:
      nudge:
        active: 0.5
        sedentary: 0.5
      idle:
        active: 0.5
        sedentary: 0.5
    active:
      nudge:
        active: 0.5
        sedentary: 0.5
      idle:
        active: 0.5
        sedentary: 0.5

agents:
  - type: random
