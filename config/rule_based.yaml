# Status: ready — validates and runs
episode_days: 90
steps_per_day: 5
seed: 42

state:
  variables:
    activity_level:
      names: [sedentary, active]

initial_state:
  activity_level: sedentary

actions:
  - nudge
  - idle

reward:
  variables:
    value:
      source: state.activity_level
      mapping: {sedentary: 0.0, active: 1.0}
  formula: "value"

transition_model:
  type: rule_based
  transition_probabilities:
    sedentary:
      nudge:
        active: 0.3
        sedentary: 0.7
      idle:
        active: 0.1
        sedentary: 0.9
    active:
      nudge:
        active: 0.5
        sedentary: 0.5
      idle:
        active: 0.6
        sedentary: 0.4

agents:
  - type: thompson_sampling
    alpha_prior: 1
    beta_prior: 1
