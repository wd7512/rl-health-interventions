name: scientisst_move
source_url: https://physionet.org/content/scientisst-move-biosignals/1.0.1/
license: open-access
file_format: csv
description: >
  ScientISST MOVE — Wearable multimodal biosignals during everyday
  life activities. Naturalistic, not lab-controlled. Open access.
expected_columns:
  user_id: string
  timestamp: datetime
  accel_x: float
  accel_y: float
  accel_z: float
  gyro_x: float
  gyro_y: float
  gyro_z: float
  eda: float
  heart_rate: float
  skin_temperature: float
  activity_label: string
user_id_column: user_id
timestamp_column: timestamp
feature_columns:
  - accel_x
  - accel_y
  - accel_z
  - gyro_x
  - gyro_y
  - gyro_z
  - eda
  - heart_rate
  - skin_temperature
target_column: activity_label
