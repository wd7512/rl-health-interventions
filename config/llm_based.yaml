# placeholder for LLM-based transition model configuration

episode_days: 90
steps_per_day: 5
seed: 42

initial_state:
  activity_level: sedentary

state:
  factors:
    activity_level:
      dims: 2
      names: [sedentary, active]

actions:
  - nudge
  - idle

reward:
  factor: activity_level
  values:
    sedentary: 0.0
    active: 1.0

transition_model:
  type: llm_based
  model: deepseek-v4-flash
