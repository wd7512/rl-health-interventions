# placeholder for LLM-based transition model configuration

episode_days: 90
steps_per_day: 5
seed: 42
initial_state: sedentary

states:
  sedentary:
    reward: 0.0
  active:
    reward: 1.0

actions:
  - name: nudge
    burden_penalty: 0.0
  - name: idle
    burden_penalty: 0.0

transition_model:
  type: llm_based
  model: deepseek-v4-flash