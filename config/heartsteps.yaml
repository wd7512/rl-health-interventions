# HeartSteps V2 agent on the sprint1 bootstrap MDP.
# Bayesian linear regression with action-centering, dosage tracking,
# and proxy value function for delayed effects.
# Reference: Liao et al. (2019) arXiv:1909.03539

initial_state:
  step_bin: inactive
  sleep: good
  day_of_week: weekday
  burden: low

state:
  variables:
    step_bin:
      names: [inactive, moderate, active]
    sleep:
      names: [good, poor]
    day_of_week:
      names: [weekday, weekend]
      advanced:
        type: cyclic
        granularity: daily
        pattern: [weekday, weekday, weekday, weekday, weekday, weekend, weekend]
    burden:
      names: [low, medium, high]
      advanced:
        type: rolling_window_count
        window_size: 3
        conditions:
          - factor: action
            type: in
            values: [movement_suggestion, goal_reminder, journal]
        mapping: {0: low, 1: medium, 2: high, 3: high}

actions:
  idle: {}
  movement_suggestion: {}
  goal_reminder: {}
  journal: {}

reward:
  constants:
    alpha: 0.9
  variables:
    step_bin_value:
      source: state.step_bin
      mapping: {inactive: 0.0, moderate: 0.5, active: 1.0}
    sleep_value:
      source: state.sleep
      mapping: {good: 1.0, poor: -1.0}
    action_penalty:
      source: action
      mapping: {idle: 0.0, movement_suggestion: 0.05, goal_reminder: 0.05, journal: 0.05}
  formula: "alpha * step_bin_value + (1 - alpha) * sleep_value - action_penalty"

transition_model:
  type: bootstrap
  table_dir: ../../../../tables/persona/base_deepseek-v4-flash

episode_days: 90
steps_per_day: 5
seed: 42

agents:
  - type: heartsteps
    gamma: 0.99
    lambda_dosage: 0.95
    w: 0.5
    epsilon_0: 0.2
    epsilon_1: 0.1
    sigma_sq: 1.0
    reference_action: idle

  - type: thompson_sampling
    alpha_prior: 1.0
    beta_prior: 1.0

  - type: epsilon_greedy
    epsilon: 0.1

  - type: random
