# Status: ready — validates and runs
episode_days: 90
steps_per_day: 5
seed: 42
initial_state: sedentary

states:
  sedentary:
    reward: 0.0
  active:
    reward: 1.0

actions:
  - nudge
  - idle

transition_model:
  type: rule_based
  transition_probabilities:
    sedentary:
      nudge:
        active: 0.3
        sedentary: 0.7
      idle:
        active: 0.1
        sedentary: 0.9
    active:
      nudge:
        active: 0.5
        sedentary: 0.5
      idle:
        active: 0.6
        sedentary: 0.4

agents:
  - type: thompson_sampling
    alpha_prior: 1
    beta_prior: 1
    contextual: true
    context_features: activity
