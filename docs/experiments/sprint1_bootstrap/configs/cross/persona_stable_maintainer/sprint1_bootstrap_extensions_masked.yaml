# Sprint1 with bootstrap transitions (extended + masked).
# Same as sprint1_bootstrap_extensions.yaml but with reward_multiplier_by_step
# masking the last step of each day to zero.

initial_state:
  step_bin: inactive
  sleep: good
  day_of_week: weekday
  burden: low

state:
  variables:
    step_bin:
      names: [inactive, moderate, active]
    sleep:
      names: [good, poor]
    day_of_week:
      names: [weekday, weekend]
      advanced:
        type: cyclic
        granularity: daily
        pattern: [weekday, weekday, weekday, weekday, weekday, weekend, weekend]
    burden:
      names: [low, medium, high]
      advanced:
        type: rolling_window_count
        window_size: 3
        conditions:
          - factor: action
            type: in
            values: [movement_suggestion, goal_reminder, journal]
        mapping: {0: low, 1: medium, 2: high, 3: high}

actions:
  idle: {}
  movement_suggestion: {}
  goal_reminder: {}
  journal: {}

reward:
  constants:
    alpha: 0.9
  variables:
    step_bin_value:
      source: state.step_bin
      mapping: {inactive: 0.0, moderate: 0.5, active: 1.0}
    sleep_value:
      source: state.sleep
      mapping: {good: 1.0, poor: -1.0}
    action_penalty:
      source: action
      mapping: {idle: 0.0, movement_suggestion: 0.05, goal_reminder: 0.05, journal: 0.05}
  formula: "alpha * step_bin_value + (1 - alpha) * sleep_value - action_penalty"

reward_multiplier_by_step: [1, 1, 1, 1, 0]

transition_model:
  type: bootstrap
  table_dir: ../../../../../../tables/persona/stable_maintainer_deepseek-v4-flash

episode_days: 90
steps_per_day: 5
seed: 42

agents:
  - type: random

  - type: thompson_sampling
    alpha_prior: 1.0
    beta_prior: 1.0
  - type: thompson_sampling
    contextual: true
    context_features: step_bin
    alpha_prior: 1.0
    beta_prior: 1.0

  - type: epsilon_greedy
    epsilon: 0.05
  - type: epsilon_greedy
    contextual: true
    context_features: step_bin
    epsilon: 0.05

  - type: decaying_epsilon_greedy
    epsilon_start: 0.2
    epsilon_min: 0.01
    decay_steps: 200
  - type: decaying_epsilon_greedy
    contextual: true
    context_features: step_bin
    epsilon_start: 0.2
    epsilon_min: 0.01
    decay_steps: 200

  - type: ucb
    c: 0.5
  - type: ucb
    contextual: true
    context_features: step_bin
    c: 0.5
