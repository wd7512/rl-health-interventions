episode_days: 90
steps_per_day: 5
seed: 42

initial_state:
  activity_level: sedentary

state:
  factors:
    activity_level:
      dims: 2
      names: [sedentary, active]

actions:
  - nudge
  - idle

reward:
  factor: activity_level
  values:
    sedentary: 0.0
    active: 1.0
  per_step_multiplier: [1, 1, 1, 1, 0]

transition_model:
  type: rule_based
  table_dir: ../tables

agents:
  - type: random

  - type: thompson_sampling
    alpha_prior: 1.0
    beta_prior: 1.0
  - type: thompson_sampling
    contextual: true
    context_feature: activity_level
    alpha_prior: 1.0
    beta_prior: 1.0

  - type: epsilon_greedy
    epsilon: 0.05
  - type: epsilon_greedy
    contextual: true
    context_feature: activity_level
    epsilon: 0.05

  - type: decaying_epsilon_greedy
    epsilon_start: 0.2
    epsilon_min: 0.01
    decay_steps: 200
  - type: decaying_epsilon_greedy
    contextual: true
    context_feature: activity_level
    epsilon_start: 0.2
    epsilon_min: 0.01
    decay_steps: 200

  - type: ucb
    c: 0.5
  - type: ucb
    contextual: true
    context_feature: activity_level
    c: 0.5
