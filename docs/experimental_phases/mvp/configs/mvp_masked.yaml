episode_days: 90
steps_per_day: 5
seed: 42

initial_state:
  activity_level: sedentary

state:
  factors:
    activity_level:
      dims: 2
      names: [sedentary, active]

actions:
  - nudge
  - idle

reward:
  factor: activity_level
  values:
    sedentary: 0.0
    active: 1.0
  per_step_multiplier: [1, 1, 1, 1, 0]

transition_model:
  type: rule_based
  table_dir: ../tables

agents:
  - type: random

  - type: thompson_sampling
    alpha_prior: 1.0
    beta_prior: 1.0

  - type: epsilon_greedy
    epsilon: 0.1

  - type: ucb
    c: 2.0
