# Sprint 1: 36-state factored MDP with LLM-bootstrapped transitions.
# 5 timesteps/day. Step bins per-timestep (<800 / 800-1600 / >1600).
# Rolling burden window (last 3 actions). Sleep updated at day boundary.
# Reward: +1 if step_bin == active, 0.5 if moderate, else 0; -0.05 per non-idle action.

initial_state:
  step_bin: inactive
  sleep: rested
  day_of_week: weekday
  burden: low

state:
  factors:
    step_bin:
      dims: 3
      names: [inactive, moderate, active]
      boundaries: [800, 1600]
    sleep:
      dims: 2
      names: [rested, under_rested]
    day_of_week:
      dims: 2
      names: [weekday, weekend]
    burden:
      dims: 3
      names: [low, medium, high]

actions:
  idle: {action_penalty: 0}
  movement_suggestion: {action_penalty: 1}
  goal_reminder: {action_penalty: 1}
  journal: {action_penalty: 1}

reward:
  factor: step_bin
  values: {inactive: 0.0, moderate: 0.5, active: 1.0}
  action_penalty_multiplier: 0.05

# Transition model: "random" for dev (generates random weights),
# "bootstrap" for real LLM-generated tables.
transition_model:
  type: bootstrap
  table_dir: ../tables

episode_days: 90
steps_per_day: 5
seed: 42
