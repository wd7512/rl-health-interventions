<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citation Graph — HeartSteps V2 & PEARL</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
#graph { width: 100vw; height: 100vh; }
.layer-label { font-size: 10px; fill: #444; text-anchor: middle; letter-spacing: 1px; }
.link { fill: none; stroke: #3a4a6a; stroke-opacity: 0.55; }
.node-circle { cursor: pointer; transition: r 0.15s; }
.node-circle:hover { filter: brightness(1.3); }
.node-label { font-size: 10px; fill: #bbb; text-anchor: middle; pointer-events: none; font-weight: 500; }
.node-year { font-size: 8px; fill: #666; text-anchor: middle; pointer-events: none; }
.tooltip { position: absolute; background: #16161e; border: 1px solid #333; border-radius: 8px; padding: 14px 18px; font-size: 13px; line-height: 1.5; max-width: 380px; pointer-events: none; opacity: 0; transition: opacity 0.15s; box-shadow: 0 8px 32px rgba(0,0,0,0.6); z-index: 100; }
.tooltip .tt-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.tooltip .tt-authors { font-size: 12px; color: #999; }
.tooltip .tt-venue { font-size: 11px; color: #6b8afd; margin-bottom: 6px; }
.tooltip .tt-headline { font-size: 12px; color: #bbb; border-left: 2px solid #6b8afd; padding-left: 8px; margin: 6px 0; }
.tooltip .tt-detail { font-size: 12px; color: #888; }
.tooltip .tt-links { font-size: 11px; color: #6b8afd; margin-top: 6px; }
.tooltip .tt-links a { color: #6b8afd; text-decoration: none; }
.tooltip .tt-links a:hover { text-decoration: underline; }
.legend { position: absolute; bottom: 20px; left: 20px; background: #16161e; border: 1px solid #2a2a35; border-radius: 8px; padding: 12px 16px; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.legend-item:last-child { margin-bottom: 0; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; }
.header { position: absolute; top: 20px; left: 20px; z-index: 10; }
.header h1 { font-size: 20px; font-weight: 700; color: #fff; }
.header p { font-size: 12px; color: #666; margin-top: 2px; }
.tabs { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; z-index: 10; }
.tab-btn { background: #16161e; border: 1px solid #2a2a35; border-radius: 8px; padding: 8px 16px; font-size: 13px; color: #888; cursor: pointer; transition: all 0.15s; }
.tab-btn:hover { border-color: #555; color: #ddd; }
.tab-btn.active { background: #5b8def; border-color: #5b8def; color: #fff; }
.highlight-edge { stroke: #a0c0ff !important; stroke-opacity: 1 !important; stroke-width: 3px !important; }
.dim { opacity: 0.08; }
</style>
</head>
<body>
<div class="header">
  <h1>Citation Graph</h1>
  <p>HeartSteps V2 & PEARL — references and citations</p>
</div>
<div class="tabs" id="tabs">
  <button class="tab-btn active" data-mode="curated">Curated</button>
  <button class="tab-btn" data-mode="full">Full</button>
</div>
<div class="tooltip" id="tooltip"></div>
<div class="legend" id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#5b8def"></div> Main papers</div>
  <div class="legend-item"><div class="legend-dot" style="background:#334466"></div> References</div>
  <div class="legend-item" style="margin-top:4px;border-top:1px solid #333;padding-top:5px"><svg width="28" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="#3a4a6a" stroke-width="2.4"/><polygon points="20,1 28,5 20,9" fill="#3a4a6a"/></svg> cites</div>
</div>
<svg id="graph"></svg>
<script>
const width = window.innerWidth;
const height = window.innerHeight;
const svg = d3.select("#graph").attr("width", width).attr("height", height);
const years = ["2010","2011","2012","2013","2014","2015","2016","2017","2018","2019","2020","2021","2022","2023","2024","2025","2026"];
const colWidth = (width - 160) / years.length;
const yearX = {};
years.forEach((y, i) => { yearX[y] = 80 + colWidth * i + colWidth / 2; });
function yearBucket(y) {
  if (yearX[String(y)]) return String(y);
  const closest = years.reduce((prev, curr) => Math.abs(curr - y) < Math.abs(prev - y) ? curr : prev);
  return closest;
}
let g, link, node;
let allNodes, allLinks, nodeMap;
let mode = 'curated';
const central = new Set(["arxiv:1909.03539","arxiv:2508.10060"]);
const isMain = d => !d.id.startsWith("ref:");

function getVisibleIds() {
  if (mode === 'full') return new Set(allNodes.map(n => n.id));
  const visible = new Set();
  allNodes.forEach(n => {
    if (!n.id.startsWith("ref:")) visible.add(n.id);
    else if (n.curated) visible.add(n.id);
  });
  return visible;
}

function compactLabel(d) {
  const a = d.authors || d.label || '';
  const first = a.split(/[\s,&;]+/)[0];
  return `${first} (${d.year})`;
}

function computeLayout(nodes, links, mode) {
  const mains = nodes.filter(isMain);
  const refs = nodes.filter(n => !isMain(n));

  const paperOrder = [
    "10.1037/0033-2909.136.6.969",
    "10.1007/s12160-018-0049-1",
    "10.1001/jamacardio.2016.4395",
    "10.1016/j.artmed.2024.102930",
    "arxiv:1909.03539",
    "10.1038/s41746-024-01089-6",
    "arxiv:2508.10060",
    "10.13026/5M0E-GX79",
    "10.1093/jamia/ocae148",
    "10.1016/j.cct.2024.107700",
  ];

  const paperIdx = {};
  mains.forEach(p => { paperIdx[p.id] = paperOrder.indexOf(p.id); });

  const topPad = 60, botPad = 40;
  const paperY = {};
  mains.forEach(p => {
    const idx = paperIdx[p.id] >= 0 ? paperIdx[p.id] : 5;
    paperY[p.id] = topPad + (idx / (paperOrder.length - 1)) * (height - topPad - botPad);
  });

  // Ensure minimum gap between same-column papers
  const colPapers = {};
  mains.forEach(p => {
    const c = yearBucket(p.year);
    if (!colPapers[c]) colPapers[c] = [];
    colPapers[c].push(p);
  });
  Object.keys(colPapers).forEach(c => {
    const ps = colPapers[c];
    if (ps.length < 2) return;
    ps.sort((a,b) => paperIdx[a.id] - paperIdx[b.id]);
    for (let i = 1; i < ps.length; i++) {
      paperY[ps[i].id] = Math.max(paperY[ps[i].id], paperY[ps[i-1].id] + 70);
    }
  });

  // Citation map: ref -> set of citing paper IDs (only main→ref links)
  const citeMap = {};
  links.forEach(l => {
    const src = l.source.id || l.source;
    const tgt = l.target.id || l.target;
    if (!isMain({id: src})) return;
    if (!tgt.startsWith("ref:")) return;
    if (!citeMap[tgt]) citeMap[tgt] = [];
    citeMap[tgt].push(src);
  });

  // Barycenter for each ref = average y of citing papers
  const barycenter = {};
  refs.forEach(n => {
    const citing = citeMap[n.id] || [];
    if (citing.length === 0) {
      barycenter[n.id] = height / 2;
    } else {
      const ys = citing.map(id => paperY[id] || height / 2);
      barycenter[n.id] = ys.reduce((a,b) => a+b, 0) / ys.length;
    }
  });

  // Sort nodes in each year column by reference y
  const colNodes = {};
  nodes.forEach(n => {
    const c = yearBucket(n.year);
    if (!colNodes[c]) colNodes[c] = [];
    colNodes[c].push(n);
  });

  // Per-pair gap: larger spacing for papers and curated refs
  function gap(a, b) {
    const aP = isMain(a) || central.has(a.id);
    const bP = isMain(b) || central.has(b.id);
    if (aP || bP) return 64;
    const aC = mode === 'curated' || a.curated;
    const bC = mode === 'curated' || b.curated;
    if (aC && bC) return 48;
    if (aC || bC) return 36;
    return 26;
  }

  const result = {};

  Object.keys(colNodes).forEach(c => {
    const ns = colNodes[c];
    if (ns.length === 0) return;
    const sorted = [...ns].sort((a,b) => {
      const aY = isMain(a) ? (paperY[a.id] || 0) : (barycenter[a.id] || height/2);
      const bY = isMain(b) ? (paperY[b.id] || 0) : (barycenter[b.id] || height/2);
      return aY - bY;
    });

    let totalH = 0;
    for (let i = 1; i < sorted.length; i++) totalH += gap(sorted[i-1], sorted[i]);
    let startY = Math.max(55, (height - totalH) / 2);

    // Place all nodes with dynamic gaps
    function placeNodes(offset) {
      const yp = {};
      let curY = offset;
      yp[sorted[0].id] = curY;
      for (let i = 1; i < sorted.length; i++) {
        curY += gap(sorted[i-1], sorted[i]);
        yp[sorted[i].id] = curY;
      }
      return yp;
    }

    let yPos = placeNodes(startY);

    // Shift column so main papers land near their natural positions
    let offsetSum = 0, offsetCount = 0;
    sorted.forEach(n => {
      if (isMain(n)) {
        offsetSum += paperY[n.id] - (yPos[n.id] || 0);
        offsetCount++;
      }
    });
    if (offsetCount > 0) {
      const avg = offsetSum / offsetCount;
      startY = Math.max(55, Math.min(height - totalH - 10, startY + avg));
      yPos = placeNodes(startY);
    }

    Object.assign(result, yPos);
  });

  // Stagger columns to prevent horizontal bands across adjacent years
  const stagPat = [0, 10, -10, 10, -10, 10, -10, 10, -10, 10, -10, 10, -10, 10, -10, 10, -10];
  Object.keys(colNodes).forEach(c => {
    const ci = years.indexOf(String(c));
    if (ci < 0) return;
    const off = stagPat[ci % stagPat.length] || 0;
    if (off === 0) return;
    // Skip stagger if it would push a node past the margin
    let safe = true;
    colNodes[c].forEach(n => {
      const ny = result[n.id] + off;
      if (ny < 55 || ny > height - 25) safe = false;
    });
    if (!safe) return;
    colNodes[c].forEach(n => { result[n.id] += off; });
  });

  return result;
}

function penalizeHorizOverlap(nodes, positions, mode) {
  const colN = {};
  nodes.forEach(n => {
    const c = yearBucket(n.year);
    if (!colN[c]) colN[c] = [];
    colN[c].push(n);
  });
  const cols = Object.keys(colN).sort((a,b) => a - b);

  // Estimate label bounding box for a node
  function bbox(n) {
    const compact = mode === 'full' && !isMain(n) && !n.curated;
    const text = compact ? compactLabel(n) : n.label;
    const fs = compact ? 8 : 10;
    const halfW = text.length * 0.62 * fs / 2;
    const cx = yearX[yearBucket(n.year)];
    const y = positions[n.id];
    let t, b;
    if (central.has(n.id)) { t = -42; b = -28; }
    else if (isMain(n)) { t = -36; b = -22; }
    else if (mode === 'curated' || n.curated) { t = -28; b = -14; }
    else { t = 11; b = 22; }
    return { l: cx - halfW, r: cx + halfW, t: y + t, b: y + b };
  }

  // Same gap logic as computeLayout for vertical re-spacing
  function gap(a, b) {
    const aP = isMain(a) || central.has(a.id);
    const bP = isMain(b) || central.has(b.id);
    if (aP || bP) return 64;
    const aC = mode === 'curated' || a.curated;
    const bC = mode === 'curated' || b.curated;
    if (aC && bC) return 48;
    if (aC || bC) return 36;
    return 26;
  }

  for (let iter = 0; iter < 30; iter++) {
    let moved = false;

    // Phase 1: resolve horizontal overlaps between adjacent columns
    for (let ci = 0; ci < cols.length - 1; ci++) {
      const cA = cols[ci], cB = cols[ci+1];
      const bnd = (yearX[cA] + yearX[cB]) / 2;

      for (const a of colN[cA]) {
        if (mode === 'full' && !isMain(a) && !a.curated) continue; // compact labels fit in column
        const ba = bbox(a);
        if (ba.r <= bnd) continue;

        for (const b of colN[cB]) {
          if (mode === 'full' && !isMain(b) && !b.curated) continue;
          const bb = bbox(b);
          if (bb.l >= bnd) continue;

          const overlap = Math.min(ba.b, bb.b) - Math.max(ba.t, bb.t);
          if (overlap > 0) {
            const push = overlap + 5;
            if (positions[a.id] < positions[b.id]) {
              positions[b.id] += push;
            } else {
              positions[a.id] -= push;
            }
            moved = true;
          }
        }
      }
    }

    // Phase 2: re-ensure vertical spacing within each column
    Object.keys(colN).forEach(c => {
      const ns = [...colN[c]].sort((x,y) => positions[x.id] - positions[y.id]);
      for (let i = 0; i < ns.length - 1; i++) {
        const curGap = positions[ns[i+1].id] - positions[ns[i].id];
        const req = gap(ns[i], ns[i+1]);
        if (curGap < req) {
          const shift = req - curGap;
          for (let j = i + 1; j < ns.length; j++) {
            positions[ns[j].id] += shift;
          }
          moved = true;
        }
      }
    });

    if (!moved) break;
  }

  return positions;
}

function render() {
  svg.selectAll("g").remove();
  const visibleIds = getVisibleIds();
  const nodes = allNodes.filter(n => visibleIds.has(n.id));
  const nm = new Map(nodes.map(n => [n.id, n]));
  const links = allLinks.filter(l => {
    const s = l.source.id || l.source;
    const t = l.target.id || l.target;
    return nm.has(s) && nm.has(t);
  });

  // Deterministic barycenter layout (no force simulation)
  const positions = computeLayout(nodes, links, mode);
  penalizeHorizOverlap(nodes, positions, mode);
  nodes.forEach(n => {
    n.x = yearX[yearBucket(n.year)];
    n.y = positions[n.id];
  });

  // Resolve link source/target from IDs → node objects for rendering
  const rlinks = links.map(l => ({
    source: nm.get(l.source.id || l.source),
    target: nm.get(l.target.id || l.target),
  })).filter(l => l.source && l.target);

  const defs = svg.append("defs");
  defs.append("marker").attr("id","arrow").attr("viewBox","0 0 10 10")
    .attr("refX",9).attr("refY",5).attr("markerWidth",8).attr("markerHeight",8)
    .attr("orient","auto")
    .append("path").attr("d","M0,1 L8,5 L0,9 Z").attr("fill","#3a4a6a");
  defs.append("marker").attr("id","arrow-hl").attr("viewBox","0 0 10 10")
    .attr("refX",9).attr("refY",5).attr("markerWidth",10).attr("markerHeight",10)
    .attr("orient","auto")
    .append("path").attr("d","M0,1 L8,5 L0,9 Z").attr("fill","#a0c0ff");

  g = svg.append("g");
  svg.call(d3.zoom().scaleExtent([0.3,4]).on("zoom", e=>g.attr("transform",e.transform)));

  // Invisible wide click target behind each edge
  g.append("g").selectAll("line").data(rlinks).join("line")
    .attr("stroke","transparent").attr("stroke-width",16)
    .attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
    .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y)
    .on("click", (event,d)=>{
      event.stopPropagation();
      const connected = new Set([d.source.id, d.target.id]);
      node.classed("dim", n=>!connected.has(n.id));
      link.classed("dim", l=>l.source.id!==d.source.id&&l.target.id!==d.target.id)
        .classed("highlight-edge", l=>l===d)
        .attr("marker-end", l=>l===d?"url(#arrow-hl)":"url(#arrow)");
    });

  link = g.append("g").selectAll("line").data(rlinks).join("line")
    .attr("class","link").attr("stroke-width",2).attr("marker-end","url(#arrow)")
    .attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
    .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);

  node = g.append("g").selectAll("g").data(nodes).join("g").attr("class","node-group")
    .attr("transform",d=>`translate(${d.x},${d.y})`);

  // Circles
  node.append("circle").attr("class","node-circle")
    .attr("r", d => central.has(d.id) ? 20 : isMain(d) ? 14 : 8)
    .attr("fill", d => central.has(d.id) ? "#5b8def" : isMain(d) ? "#4a7acc" : "#334466")
    .attr("stroke", d => central.has(d.id) ? "#a0c0ff" : "none")
    .attr("stroke-width", d => central.has(d.id) ? 2 : 0);

  // Labels: conditional — compact for non-curated refs in full mode
  const isCompact = d => mode === 'full' && !isMain(d) && !d.curated;
  node.append("text").attr("class","node-label")
    .attr("dy", d => central.has(d.id) ? -28 : isMain(d) ? -22 : (mode === 'curated' || d.curated) ? -14 : 11)
    .attr("font-size", d => isCompact(d) ? "8px" : "10px")
    .text(d => {
      if (isMain(d)) return d.label;
      if (mode === 'curated' || d.curated) return d.label;
      return compactLabel(d);
    });

  // Year: only for nodes that have room (skip compact refs)
  node.filter(d => !isCompact(d)).append("text").attr("class","node-year")
    .attr("dy", d => central.has(d.id) ? 34 : isMain(d) ? 26 : 18)
    .text(d => d.year);

  const tooltip = d3.select("#tooltip");
  node.on("mouseenter", (event,d)=>{
    const isDoi = d.id.startsWith("10.");
    const isArxiv = d.id.startsWith("arxiv:");
    const url = isDoi ? `https://doi.org/${d.id}` : isArxiv ? `https://arxiv.org/abs/${d.id.replace("arxiv:","")}` : null;
    const linkLabel = isDoi ? `DOI: ${d.id}` : isArxiv ? `arXiv: ${d.id.replace("arxiv:","")}` : "";
    tooltip.style("opacity",1).html(`
      <div class="tt-title">${d.label}</div>
      <div class="tt-authors">${d.authors} (${d.year})</div>
      <div class="tt-venue">${d.venue}</div>
      <div class="tt-headline">${d.headline}</div>
      <div class="tt-detail">${d.detail}</div>
      ${url?`<div class="tt-links"><a href="${url}" target="_blank">${linkLabel}</a></div>`:""}
    `);
  }).on("mousemove", event=>{
    tooltip.style("left",(event.pageX+16)+"px").style("top",(event.pageY-10)+"px");
  }).on("mouseleave", ()=>tooltip.style("opacity",0));

  node.on("click", (event,d)=>{
    const connected = new Set([d.id]);
    rlinks.forEach(l=>{
      if(l.source.id===d.id) connected.add(l.target.id);
      if(l.target.id===d.id) connected.add(l.source.id);
    });
    node.classed("dim", n=>!connected.has(n.id));
    link.classed("dim", l=>l.source.id!==d.id&&l.target.id!==d.id)
      .classed("highlight-edge", l=>l.source.id===d.id||l.target.id===d.id)
      .attr("marker-end", l=>l.source.id===d.id||l.target.id===d.id?"url(#arrow-hl)":"url(#arrow)");
  });

  svg.on("click", event=>{
    if(event.target===svg.node()){
      node.classed("dim",false);
      link.classed("dim",false).classed("highlight-edge",false).attr("marker-end","url(#arrow)");
    }
  });

  g.selectAll(".layer-label").data(years.map(y=>({x:yearX[y],y:35,text:y}))).join("text")
    .attr("class","layer-label").attr("x",d=>d.x).attr("y",d=>d.y).text(d=>d.text);
}

d3.json("citations.json").then(data => {
  const mainPapers = data.papers;
  const refs = data.refs || {};
  allNodes = Object.entries(mainPapers).map(([id, p]) => ({ id, ...p }));
  Object.entries(refs).forEach(([id, r]) => { allNodes.push({ id, ...r }); });
  allNodes.forEach(n => { if (n.curated === undefined) n.curated = false; });
  nodeMap = new Map(allNodes.map(n => [n.id, n]));
  allLinks = [];
  Object.entries(mainPapers).forEach(([srcId, p]) => {
    (p.cites || []).forEach(tgtId => {
      if (nodeMap.has(tgtId)) allLinks.push({ source: srcId, target: tgtId });
    });
  });

  render();
  d3.selectAll(".tab-btn").on("click", function() {
    d3.selectAll(".tab-btn").classed("active", false);
    d3.select(this).classed("active", true);
    mode = d3.select(this).attr("data-mode");
    render();
  });
});
</script>
</body>
</html>
