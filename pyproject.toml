[project]
name = "rl-health-interventions"
version = "0.1.0"
description = "Simulation framework for testing RL-driven health interventions on wearable device data."
readme = "README.md"
authors = [
    { name = "William Dennis", email = "wwdennis.home@gmail.com" }
]
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.4.0,<10",
    "ruff>=0.14.10,<0.15",
    "ty>=0.0.42,<0.1",
]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["uv_build>=0.9.17,<0.10.0"]
build-backend = "uv_build"
