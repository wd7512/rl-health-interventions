name: Require linked issue

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read
  issues: read

jobs:
  check-linked-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const body = context.payload.pull_request.body || ''
            const prNumber = context.payload.pull_request.number

            // Check for "Closes #N" or "Fixes #N" or "Resolves #N"
            const linkedIssueMatch = body.match(/(?:closes|fixes|resolves)\s+#(\d+)/i)

            if (!linkedIssueMatch) {
              core.setFailed(
                `PR #${prNumber} must link an issue using "Closes #N", "Fixes #N", or "Resolves #N".\n\nEvery PR needs a linked issue that meets the task template (What / Why / Completion Criteria / Evidence).`
              )
              return
            }

            const issueNumber = linkedIssueMatch[1]

            // Fetch the linked issue
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            })

            // Check that the issue is not labeled "needs-refinement"
            const labels = issue.labels.map(l => l.name)
            if (labels.includes('needs-refinement')) {
              core.setFailed(
                `Issue #${issueNumber} is labeled "needs-refinement".\n\nRemove the "needs-refinement" label before linking it to a PR.`
              )
              return
            }

            console.log(`PR #${prNumber} linked to issue #${issueNumber} ✓`)
