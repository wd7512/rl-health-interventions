name: Enforce issue template

on:
  issues:
    types: [opened, edited]

jobs:
  check-template:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue
            const body = (issue.body || '').toLowerCase()
            const labels = issue.labels.map(l => l.name)

            // Skip if already labeled needs-refinement or if it's not the task template
            if (labels.includes('needs-refinement')) {
              return
            }

            // Check for exact template: "I want to ... to achieve ... to benefit the research in ..."
            const whatPattern = /i want to .+ to achieve .+ to benefit the research in .+/i
            const hasWhat = whatPattern.test(issue.body || '')

            // Check for completion criteria section
            const hasDone = body.includes('completion criteria') || body.includes('## completion criteria')

            const missing = []
            if (!hasWhat) missing.push('What: must follow exact format — "I want to [action] to achieve [goal] to benefit the research in [way]"')
            if (!hasDone) missing.push('Completion criteria: must have a "## Completion criteria" section')

            if (missing.length > 0) {
              // Add needs-refinement label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-refinement'],
              })

              // Post comment explaining what's missing
              const bodyText = `Thanks for opening this issue! It doesn't yet meet our task template requirements.\n\n**Missing or incomplete:**\n${missing.map(m => `- ${m}`).join('\n')}\n\nEvery issue must follow this structure:\n\n1. **What:** Exact sentence — "I want to [action] to achieve [goal] to benefit the research in [way]"\n2. **Completion criteria:** A section titled "## Completion criteria" with a checklist of what must be true\n3. **Evidence** (optional) — papers, notes, data\n4. **Notes** (optional) — dependencies, hints\n\nPlease update the issue using our [task template](.github/ISSUE_TEMPLATE/task.md) and remove the \`needs-refinement\` label when it's ready for implementation.`

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: bodyText,
              })

              console.log(`Issue #${issue.number} auto-labeled as needs-refinement (${missing.length} missing sections)`)
            } else {
              console.log(`Issue #${issue.number} meets template requirements ✓`)
            }
