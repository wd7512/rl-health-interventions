name: Enforce issue template

on:
  issues:
    types: [opened, edited]

jobs:
  check-template:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue
            const body = (issue.body || '').toLowerCase()
            const labels = issue.labels.map(l => l.name)

            // Skip if already labeled needs-refinement or if it's not the task template
            if (labels.includes('needs-refinement')) {
              return
            }

            // Check for template compliance
            const hasWhat = body.includes('i want to')
            const hasWhy = body.includes('so that') || body.includes('this ') || body.includes('benefit')
            const hasDone = body.includes('completion criteria') || body.includes('done') || body.includes('how do we know')

            const missing = []
            if (!hasWhat) missing.push('What do you want to do? ("I want to...")')
            if (!hasWhy) missing.push('Why? How does this benefit the research?')
            if (!hasDone) missing.push('Completion criteria (how do we know this is done?)')

            if (missing.length > 0) {
              // Add needs-refinement label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-refinement'],
              })

              // Post comment explaining what's missing
              const bodyText = `Thanks for opening this issue! It looks like it doesn't yet meet our task template requirements.\n\n**Missing:**\n${missing.map(m => `- ${m}`).join('\n')}\n\nPlease flesh out the issue using our [task template](.github/ISSUE_TEMPLATE/task.md) and then remove the \`needs-refinement\` label when it's ready for implementation.\n\nA complete issue answers:\n1. **What do you want to do?**\n2. **Why?** How does this benefit the research?\n3. **Completion criteria** — how do we know this is done?\n4. **Evidence** (optional) — papers, notes, data`

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: bodyText,
              })

              console.log(`Issue #${issue.number} auto-labeled as needs-refinement (${missing.length} missing sections)`)
            } else {
              console.log(`Issue #${issue.number} meets template requirements ✓`)
            }
