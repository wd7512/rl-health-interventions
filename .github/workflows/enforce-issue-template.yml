name: Enforce issue template

on:
  issues:
    types: [opened, edited]

jobs:
  check-template:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const issue = context.payload.issue
            const labels = issue.labels.map(l => l.name)

            // Skip if already labeled
            if (labels.includes('needs-refinement') || labels.includes('needs-triage')) {
              return
            }

            // Check prerequisites checkboxes
            const body = issue.body || ''
            const prereqMatch = body.match(/### Before submitting\s*\n([\s\S]*?)(?:\n###|\n$)/)
            const prereqSection = prereqMatch ? prereqMatch[1] : ''
            const hasSearch = /\[x\][\s\S]*?searched existing issues/i.test(prereqSection)
            const hasSummary = /\[x\][\s\S]*?clear one-sentence summary/i.test(prereqSection)

            // Check one-sentence summary format
            const summaryMatch = body.match(/### One-sentence summary\s*\n([\s\S]*?)(?:\n###|\n$)/)
            const summaryText = summaryMatch ? summaryMatch[1].trim() : ''
            const hasExactFormat = /I want to .+ to achieve .+ to benefit the research in .+/i.test(summaryText)

            // Check completion criteria section exists
            const hasCompletion = /### Completion criteria/i.test(body)

            // Check context/motivation section exists and is not empty
            const contextMatch = body.match(/### Context & motivation\s*\n([\s\S]*?)(?:\n###|\n$)/)
            const contextText = contextMatch ? contextMatch[1].trim() : ''
            const hasContext = contextText.length > 20

            const missing = []
            if (!hasSearch) missing.push('Prerequisites: must check "I have searched existing issues"')
            if (!hasSummary) missing.push('Prerequisites: must check "I have provided a clear one-sentence summary"')
            if (!hasExactFormat) missing.push('Summary: must follow exact format — "I want to [action] to achieve [goal] to benefit the research in [way]"')
            if (!hasCompletion) missing.push('Completion criteria: must have a "### Completion criteria" section')
            if (!hasContext) missing.push('Context: must fill in "### Context & motivation" (at least 20 chars)')

            if (missing.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-refinement'],
              })

              const bodyText = `Thanks for opening this issue! It doesn't yet meet our task template requirements.\n\n**Missing or incomplete:**\n${missing.map(m => `- ${m}`).join('\n')}\n\nEvery task must follow this structure:\n\n1. **Prerequisites** — check both boxes\n2. **One-sentence summary** — exact format: "I want to [action] to achieve [goal] to benefit the research in [way]"\n3. **Context & motivation** — why does this matter? Link papers/notes.\n4. **Completion criteria** — checklist of what must be true\n5. **Evidence** (optional) — papers, notes, data\n6. **Dependencies & notes** (optional) — blockers, hints\n\nPlease update the issue using our [task template](.github/ISSUE_TEMPLATE/task.yml) and remove the \`needs-refinement\` label when it's ready for implementation.`

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: bodyText,
              })

              console.log(`Issue #${issue.number} auto-labeled as needs-refinement (${missing.length} missing sections)`)
            } else {
              console.log(`Issue #${issue.number} meets template requirements ✓`)
            }
